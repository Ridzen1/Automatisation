version: '3.8'
services:
  php: 
    build: './docker/php'
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    command: php -S 0.0.0.0:80 -t .
    depends_on:
      - db
      
  db:
    image: mariadb:10.5
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: racoin
      MYSQL_USER: racoin_user
      MYSQL_PASSWORD: racoin_password
    ports:
      - "3306:3306"

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db