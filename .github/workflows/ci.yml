name: Pipeline CI/CD Symfony

on:
  push:

jobs:
  workflow:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./cours4/td_backend

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: ctype, iconv, sqlite3

    - uses: actions/checkout@v4

    - name: Creation .env depuis .env.test
      run: cp .env.test .env

    - name: Installation dependances
      run: composer install --prefer-dist --no-progress

    - name: Preparation BDD
      run: |
        mkdir -p var
        php bin/console doctrine:database:create --env=test --if-not-exists
        php bin/console doctrine:schema:create --env=test

    - name: Verification style (PHPCS)
      run: vendor/bin/php-cs-fixer fix --dry-run --diff

    - name: Analyse statique (PHPStan)
      run: vendor/bin/phpstan analyse src tests

    - name: Tests Unitaires (PHPUnit)
      run: vendor/bin/phpunit